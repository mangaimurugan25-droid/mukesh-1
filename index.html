<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>COVID Health Stats Tracker</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}body{background:linear-gradient(135deg,#4f46e5,#06b6d4);min-height:100vh;padding:30px}.container{max-width:1200px;margin:auto;background:#fff;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.2)}h1{text-align:center;color:#4f46e5;margin-bottom:25px}.search{display:flex;justify-content:center;gap:10px;margin-bottom:25px;flex-wrap:wrap}input{padding:12px;width:300px;border:2px solid #ddd;border-radius:10px;font-size:16px}button{padding:12px 25px;background:#4f46e5;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:16px}button:hover{background:#3730a3}.country{text-align:center;margin-bottom:20px}.country img{width:120px;height:80px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.2)}.country h2{margin-top:10px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:20px}.card{background:#f8fafc;padding:20px;border-radius:15px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.1)}.card h3{color:#4f46e5;margin-bottom:10px}.card p{font-size:24px;font-weight:700}.alert{background:red;color:#fff;padding:15px;text-align:center;margin-top:20px;border-radius:10px;font-weight:700;display:none}table{width:100%;margin-top:25px;border-collapse:collapse;overflow:hidden}th{background:#4f46e5;color:#fff;padding:12px}td{padding:12px;border:1px solid #ddd;text-align:center}</style><script defer="defer" src="/mukesh/static/js/main.8e84a8e2.js"></script><link href="/mukesh/static/css/main.39c51b1e.css" rel="stylesheet"></head><body><div class="container"><h1>🌍 COVID Health Stats Tracker</h1><div class="search"><input id="countryInput" placeholder="Enter Country Name"> <button onclick="getData()">Search</button></div><div class="country"><img id="flag" src="" alt=""><h2 id="countryName"></h2></div><div class="cards"><div class="card"><h3>Total Cases</h3><p id="cases">0</p></div><div class="card"><h3>Recovered</h3><p id="recovered">0</p></div><div class="card"><h3>Deaths</h3><p id="deaths">0</p></div><div class="card"><h3>Active Cases</h3><p id="active">0</p></div></div><div class="alert" id="alertBox">⚠ High Risk Country Alert</div><table><tr><th>Country</th><th>Total Cases</th><th>Recovered</th><th>Deaths</th><th>Active</th></tr><tr><td id="tCountry">-</td><td id="tCases">-</td><td id="tRecovered">-</td><td id="tDeaths">-</td><td id="tActive">-</td></tr></table></div><script>async function getData(){let e=document.getElementById("countryInput").value||"India";try{const t=await fetch(`https://disease.sh/v3/covid-19/countries/${e}`),n=await t.json();document.getElementById("flag").src=n.countryInfo.flag,document.getElementById("countryName").innerHTML=n.country,document.getElementById("cases").innerHTML=n.cases.toLocaleString(),document.getElementById("recovered").innerHTML=n.recovered.toLocaleString(),document.getElementById("deaths").innerHTML=n.deaths.toLocaleString(),document.getElementById("active").innerHTML=n.active.toLocaleString(),document.getElementById("tCountry").innerHTML=n.country,document.getElementById("tCases").innerHTML=n.cases.toLocaleString(),document.getElementById("tRecovered").innerHTML=n.recovered.toLocaleString(),document.getElementById("tDeaths").innerHTML=n.deaths.toLocaleString(),document.getElementById("tActive").innerHTML=n.active.toLocaleString(),n.active>1e5?document.getElementById("alertBox").style.display="block":document.getElementById("alertBox").style.display="none"}catch{alert("Country Not Found")}}getData()</script></body></html>
